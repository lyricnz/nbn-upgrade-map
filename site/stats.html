<!DOCTYPE html>
<html lang="en">
<head>
    <title>NBN Technology Breakdown</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Breakdown of NBN technology by date.">
    <meta name="author" content="Luke Prior">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-5VVNNFL32M"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());

        gtag('config', 'G-5VVNNFL32M');
    </script>

    <!-- Include Chart.js library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <meta name="description" content="Statistics about current technology type for NBN in Australia.">
    <meta name="author" content="Luke Prior">
    <meta name="keywords" content="nbn,map,australia,statistics,fttn,fttp,fttc,wireless">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.0/jquery.min.js" integrity="sha512-3gJwYpMe3QewGELv8k/BX9vcqhryRdzRMxVfq6ngyWXwo03GFEzjsUm8Q7RZcHPHksttq7/GFoxjCVUjkjvPdw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</head>
<body>
    <div style="width: 80%; margin: 0 auto;">
    <select id="region" style="width: 300px;">
        <option value="">ALL</option>
        <option value="nsw">NSW</option>
        <option value="vic">VIC</option>
        <option value="qld">QLD</option>
        <option value="sa">SA</option>
        <option value="wa">WA</option>
        <option value="tas">TAS</option>
        <option value="nt">NT</option>
        <option value="act">ACT</option>
    </select>
    </div>
    <script>
        // add onchange event to option to change the URL
        $("select#region").on("change", function() {
            var region = $(this).find(":selected").text();
            var url = window.location.protocol + "//" + window.location.host + window.location.pathname + '?region=' + encodeURIComponent(region);
            $(location).attr('href', url);
        })
    </script>

    <div style="width: 80%; margin: 0 auto;">
        <!-- Heading for Line Chart -->
        <h2 id="linechart">Line Chart by Technology</h2>
        <!-- Create a taller canvas element to render the line chart -->
        <div style="height: 500px;">
            <canvas id="line-chart"></canvas>
        </div>
    </div>
    <div style="width: 80%; margin: 0 auto;">
        <!-- Heading for Line Chart -->
        <h2>Line Chart by Technology Percentage</h2>
        <!-- Create a taller canvas element to render the line chart -->
        <div style="height: 500px;">
            <canvas id="linechart-percent"></canvas>
        </div>
    </div>
    <div style="width: 80%; margin: 0 auto;">
        <!-- Heading for Pie Chart -->
        <h2 id="piechart">Pie Chart by Technology</h2>
        <!-- Create a canvas element to render the pie chart -->
        <div style="height: 300px;">
            <canvas id="pie-chart"></canvas>
        </div>
    </div>

    <script>
        var urlParams = new URLSearchParams(window.location.search);
        var region = ''
        if (urlParams.has('region') && ['nsw', 'vic', 'qld', 'sa', 'wa', 'tas', 'nt', 'act'].includes(urlParams.get('region').toLowerCase())) {
            region = urlParams.get('region').toLowerCase();
        }

        var url = region == '' ? '' : '-state';

        // update titles to include the region
        var regionPrefix = region == '' ? '' : region.toUpperCase() + ": ";
        $("#linechart").text(regionPrefix + "Line Chart by Technology");
        $("#piechart").text(regionPrefix + "Pie Chart by Technology");

        // update the dropdown to match the region
        $("select#region").val(region);


        // Function to fetch JSON data
        const fetchData = (() => {
            let cachedData = null;
            let isFetching = false;

            return async () => {
                if (cachedData) {
                    return cachedData;
                }

                if (isFetching) {
                    await new Promise(resolve => {
                        const intervalId = setInterval(() => {
                        if (!isFetching) {
                            clearInterval(intervalId);
                            resolve();
                        }
                        }, 100);
                    });
                    return cachedData;
                }

                isFetching = true;

                try {
                    const response = await fetch('https://cdn.jsdelivr.net/gh/LukePrior/nbn-upgrade-map@latest/results/breakdown' + url + '.json');
                    let data = await response.json();
                    if (region != '') {
                        Object.keys(data).forEach(date => {
                            Object.keys(data[date]).forEach(state => {
                                if (state.toLowerCase() == region) {
                                    data[date]['tech'] = data[date][state];
                                }
                            });
                        });
                    }
                    console.log(data);
                    Object.keys(data).forEach(date => {
                        delete data[date].tech['NULL'];
                    });
                    cachedData = data;
                    isFetching = false;
                    return data;
                } catch (error) {
                    console.error('Error fetching data:', error);
                    isFetching = false;
                }
            };
        })();

        // Function to prepare data for the line chart
        async function prepareLineChartData() {
            const rawData = await fetchData();
            const dates = Object.keys(rawData).filter(date => date >= "2023-08-01");
            const newestDate = Object.keys(rawData).sort().reverse()[0];
            const techData = rawData[newestDate].tech;
            const sortedTechData = sortTechData(techData);

            const datasets = sortedTechData.map((techData, index) => ({
                label: techData.label,
                data: dates.map(date => rawData[date].tech[techData.label]),
                borderWidth: 2,
                fill: true,
            }));

            return { dates, datasets };
        }

        // Function to prepare data for the line chart percentage
        async function prepareLineChartPercentageData() {
            const rawData = await fetchData();
            const dates = Object.keys(rawData).filter(date => date >= "2023-08-01");
            const newestDate = Object.keys(rawData).sort().reverse()[0];
            const techData = rawData[newestDate].tech;
            const sortedTechData = sortTechData(techData);

            const datasets = sortedTechData.map((techData, index) => ({
                label: techData.label,
                data: dates.map(date => rawData[date].tech[techData.label] || 0),
                borderWidth: 2,
                fill: true,
            }));

            const total = datasets.map(dataset => dataset.data).reduce((a, b) => a.map((value, index) => value + b[index]));

            datasets.forEach(dataset => {
                dataset.data = dataset.data.map((value, index) => (value / total[index]) * 100);
            });

            return { dates, datasets };
        }

        // Function to prepare data for the pie chart
        async function preparePieChartData() {
            const rawData = await fetchData();
            const newestDate = Object.keys(rawData).sort().reverse()[0];
            const techData = rawData[newestDate].tech;
            const sortedTechData = sortTechData(techData);

            return {
                labels: sortedTechData.map(data => data.label),
                values: sortedTechData.map(data => data.value),
            };
        }

        // Helper function to sort tech data in descending order of values
        function sortTechData(techData) {
            const techLabels = Object.keys(techData);
            const techValues = Object.values(techData);

            return techLabels.map((label, index) => ({
                label: label,
                value: techValues[index],
            })).sort((a, b) => b.value - a.value);
        }

        // Create the line chart
        async function createLineChart() {
            const chartData = await prepareLineChartData();

            const ctx = document.getElementById('line-chart').getContext('2d');
            const lineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.dates,
                    datasets: chartData.datasets,
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            stacked: true,
                            beginAtZero: true,
                        },
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.dataset.label || '';
                                    const value = context.formattedValue;
                                    const dataset = context.dataset || {};
                                    const valueActual = dataset.data[context.dataIndex];
                                    const total = chartData.datasets.reduce((a, b) => a + b.data[context.dataIndex], 0);
                                    const percentage = ((valueActual / total) * 100).toFixed(2);
                                    return label + ': ' + value + ' (' + percentage + '%)';
                                },
                            },
                        },
                    },
                },
            });
        }

        // Create the line chart percentage
        async function createLineChartPercentage() {
            const chartData = await prepareLineChartPercentageData();

            const ctx = document.getElementById('linechart-percent').getContext('2d');
            const lineChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartData.dates,
                    datasets: chartData.datasets,
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            stacked: true,
                            beginAtZero: true,
                        },
                    },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + Math.round(context.formattedValue * 100) / 100 + '%';
                                },
                            },
                        },
                    },
                },
            });
        }

        // Create the pie chart
        async function createPieChart() {
            const pieData = await preparePieChartData();

            const ctx = document.getElementById('pie-chart').getContext('2d');
            const pieChart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: pieData.labels,
                    datasets: [{
                        data: pieData.values,
                    }],
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    const label = context.label || '';
                                    const value = context.formattedValue;
                                    const dataset = context.dataset || {};
                                    const valueActual = dataset.data[context.dataIndex];
                                    const total = pieData.values.reduce((a, b) => a + b, 0);
                                    const percentage = ((valueActual / total) * 100).toFixed(2);
                                    return label + ': ' + value + ' (' + percentage + '%)';
                                },
                            },
                        },
                    },
                },
            });
        }

        // Call the functions to create both charts
        createLineChart();
        createPieChart();
        createLineChartPercentage();
    </script>
</body>
</html>
